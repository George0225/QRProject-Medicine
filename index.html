<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transnovo 健耕医疗 · 药交会 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1A2744;
      --navy-2:  #F4F6FB;
      --navy-3:  #E8EDF8;
      --crimson: #E8174D;
      --crimson-dim: rgba(232, 23, 77, 0.08);
      --glass:   rgba(255, 255, 255, 0.85);
      --glass-border: rgba(26, 39, 68, 0.1);
      --text:    #1A2744;
      --muted:   rgba(26, 39, 68, 0.5);
      --radius:  16px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy-2);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── animated bg mesh ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 10%, rgba(232,23,77,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 80%, rgba(43,58,107,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* noise grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 0 28px;
      gap: 16px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeUp 0.7s ease forwards 0.1s;
    }

    .header-logo {
      height: 56px;
      width: auto;
      max-width: 320px;
      filter: drop-shadow(0 2px 8px rgba(26,39,68,0.12));
    }

    .cmef-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--crimson-dim);
      border: 1px solid rgba(232,23,77,0.2);
      color: var(--crimson);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.12em;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .cmef-badge::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--crimson);
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ─── SECTION WRAPPER ─── */
    .section {
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(24px);
    }
    .section.s1 { animation: fadeUp 0.65s ease forwards 0.25s; }
    .section.s2 { animation: fadeUp 0.65s ease forwards 0.4s; }
    .section.s3 { animation: fadeUp 0.65s ease forwards 0.55s; }
    .section.s4 { animation: fadeUp 0.65s ease forwards 0.7s; }
    .section.s5 { animation: fadeUp 0.65s ease forwards 0.85s; }

    .section-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--crimson);
      margin-bottom: 10px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(232,23,77,0.4), transparent);
    }

    /* ─── GLASS CARD ─── */
    .glass-card {
      background: #ffffff;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: 0 2px 16px rgba(26,39,68,0.07);
      overflow: hidden;
    }

    /* ─── VIDEO ─── */
    .video-card {
      position: relative;
    }
    .video-card video {
      width: 100%;
      display: block;
      border-radius: var(--radius);
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #000;
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(255,255,255,0.3) 100%);
      border-radius: var(--radius);
      pointer-events: none;
    }

    /* ─── WEBSITE BUTTON ─── */
    .website-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .website-btn:active { transform: scale(0.98); }
    .website-btn:hover { background: rgba(26,39,68,0.03); }

    .website-btn-left { display: flex; flex-direction: column; gap: 4px; }
    .website-btn-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }
    .website-btn-url {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .website-btn-url span { color: var(--crimson); }

    .arrow-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--crimson);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .website-btn:hover .arrow-icon { transform: translate(3px, -3px); }

    /* ─── CONTACTS ─── */
    .contacts-list { display: flex; flex-direction: column; gap: 1px; }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(26,39,68,0.07);
      transition: background 0.2s;
    }
    .contact-item:last-child { border-bottom: none; }
    .contact-item:hover { background: rgba(26,39,68,0.02); }

    .contact-left { display: flex; flex-direction: column; gap: 3px; }
    .contact-role {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
    }
    .contact-name {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }
    .contact-phone {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: rgba(26,39,68,0.6);
      letter-spacing: 0.05em;
    }

    .call-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(232,23,77,0.12);
      border: 1px solid rgba(232,23,77,0.25);
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .call-btn:active { transform: scale(0.9); background: var(--crimson); }

    /* ─── WECHAT QR ─── */
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px;
      gap: 14px;
    }
    .qr-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
    }
    .qr-image {
      width: 180px;
      height: 180px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      object-fit: contain;
      background: #fff;
      padding: 8px;
    }
    .qr-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ─── DIVIDER ─── */
    .divider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px 18px;
    }
    .divider-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(26,39,68,0.1);
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      padding-top: 20px;
      opacity: 0;
      animation: fadeUp 0.65s ease forwards 1s;
    }
    .footer-line {
      width: 40px;
      height: 2px;
      background: var(--crimson);
      margin: 0 auto 14px;
      border-radius: 2px;
    }
    .footer-text {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
